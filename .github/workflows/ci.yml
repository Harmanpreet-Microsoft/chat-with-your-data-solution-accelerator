name: Validate Deployment

on:
  push:
    branches:
      - main
      - dev
      - demo
  schedule:
    - cron: '0 8,20 * * *'  # Runs at 8:00 AM and 8:00 PM GMT
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    outputs:
      imageTag: ${{ steps.set-image-tag.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Quota Check
        id: quota-check
        run: |
          export AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          export AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          export AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          export GPT_MIN_CAPACITY="30"
          export TEXT_EMBEDDING_MIN_CAPACITY="30"
          export AZURE_REGIONS="${{ vars.AZURE_REGIONS }}"

          chmod +x scripts/checkquota.sh
          if ! scripts/checkquota.sh; then
            if grep -q "No region with sufficient quota found" scripts/checkquota.sh; then
              echo "QUOTA_FAILED=true" >> $GITHUB_ENV
            fi
            exit 1
          fi

      - name: Send Notification on Quota Failure
        if: env.QUOTA_FAILED == 'true'
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The quota check has failed, and the pipeline cannot proceed.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please take necessary action.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"

      - name: Fail Pipeline if Quota Check Fails
        if: env.QUOTA_FAILED == 'true'
        run: exit 1

      - name: Set Deployment Region
        run: |
          echo "Selected Region: $VALID_REGION"
          echo "AZURE_LOCATION=$VALID_REGION" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set imageTag
        id: set-image-tag
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          else
            echo "imageTag=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "::set-output name=imageTag::${{ github.ref_name }}"
          fi

      - name: Pre-build image and deploy
        uses: devcontainers/ci@v0.3
        env:
          AZURE_ENV_NAME: ${{ github.run_id }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
        with:
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          cacheFrom: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: |
            export optional_args="./code/tests"

            # Capture deployment output to a log file
            make ci 2>&1 | tee ci_output.log
            make deploy 2>&1 | tee deploy_output.log

            # Try to extract URLs from deployment logs as backup
            echo "=== Extracting URLs from deployment logs ==="
            grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" deploy_output.log | head -2 | tee extracted_urls.txt || echo "No URLs found in logs"

            # Check if we have admin URL in logs
            grep -E "Done: Deploying service adminweb" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_admin_url.txt || echo "" > log_admin_url.txt

            # Check if we have web URL in logs
            grep -E "Done: Deploying service web" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_frontend_url.txt || echo "" > log_frontend_url.txt

            echo "URLs from logs:"
            echo "Admin URL from logs: $(cat log_admin_url.txt)"
            echo "Frontend URL from logs: $(cat log_frontend_url.txt)"
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION
            AUTH_ENABLED=false
            AZURE_USE_AUTHENTICATION=false
            AZURE_ENABLE_AUTH=false

      - name: Extract URLs from deployment
        id: extract-urls
        run: |
          # Method 1: Check files created by Makefile
          echo "=== Method 1: Files from Makefile ==="
          if [ -f "frontend_url.txt" ]; then
            FRONTEND_URL=$(cat frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from makefile: '$FRONTEND_URL'"
          fi

          if [ -f "admin_url.txt" ]; then
            ADMIN_URL=$(cat admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from makefile: '$ADMIN_URL'"
          fi

          # Method 2: Check URLs extracted from logs
          echo "=== Method 2: URLs from deployment logs ==="
          if [ -f "log_frontend_url.txt" ]; then
            LOG_FRONTEND_URL=$(cat log_frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from logs: '$LOG_FRONTEND_URL'"
            if [ -z "$FRONTEND_URL" ] && [ -n "$LOG_FRONTEND_URL" ]; then
              FRONTEND_URL="$LOG_FRONTEND_URL"
            fi
          fi

          if [ -f "log_admin_url.txt" ]; then
            LOG_ADMIN_URL=$(cat log_admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from logs: '$LOG_ADMIN_URL'"
            if [ -z "$ADMIN_URL" ] && [ -n "$LOG_ADMIN_URL" ]; then
              ADMIN_URL="$LOG_ADMIN_URL"
            fi
          fi

          # Set outputs
          if [ -n "$FRONTEND_URL" ] && [ "$FRONTEND_URL" != "null" ] && [ "$FRONTEND_URL" != "" ]; then
            echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=$FRONTEND_URL" >> $GITHUB_ENV
            echo "✅ Frontend URL: $FRONTEND_URL"
          else
            echo "frontend_url=" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Frontend URL: Not found"
          fi

          if [ -n "$ADMIN_URL" ] && [ "$ADMIN_URL" != "null" ] && [ "$ADMIN_URL" != "" ]; then
            echo "admin_url=$ADMIN_URL" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=$ADMIN_URL" >> $GITHUB_ENV
            echo "✅ Admin URL: $ADMIN_URL"
          else
            echo "admin_url=" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Admin URL: Not found"
          fi

          # Additional debugging
          echo "=== All Available Files ==="
          ls -la *.txt *.log *.json 2>/dev/null || echo "No relevant files found"

      - name: Display URLs
        run: |
          echo "Frontend URL: ${{ env.FRONTEND_WEBSITE_URL }}"
          echo "Admin URL: ${{ env.ADMIN_WEBSITE_URL }}"

      - name: Configure App Services for Testing
        run: |
          # Login to Azure CLI
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Get resource group and app names from azd environment
          RESOURCE_GROUP=$(azd env get-values | grep AZURE_RESOURCE_GROUP | cut -d'=' -f2 | tr -d '"')
          FRONTEND_APP=$(azd env get-values | grep FRONTEND_WEBSITE_NAME | cut -d'=' -f2 | tr -d '"')
          ADMIN_APP=$(azd env get-values | grep ADMIN_WEBSITE_NAME | cut -d'=' -f2 | tr -d '"')

          echo "Resource Group: $RESOURCE_GROUP"
          echo "Frontend App: $FRONTEND_APP"
          echo "Admin App: $ADMIN_APP"

          # Wait for App Services to be fully provisioned
          echo "Waiting for App Services to be ready..."
          az webapp show --name $FRONTEND_APP --resource-group $RESOURCE_GROUP --query "state" --output tsv
          az webapp show --name $ADMIN_APP --resource-group $RESOURCE_GROUP --query "state" --output tsv

          # Configure application settings to disable authentication requirements
          echo "Setting application configuration for no-auth testing..."

          # Set application settings to disable authentication
          az webapp config appsettings set --name $FRONTEND_APP --resource-group $RESOURCE_GROUP --settings \
            "AUTH_ENABLED=false" \
            "AZURE_USE_AUTHENTICATION=false" \
            "AZURE_ENABLE_AUTH=false" \
            "REQUIRE_AUTHENTICATION=false" \
            "AUTHENTICATION_ENABLED=false" \
            "AZURE_CLIENT_ID=" \
            "AZURE_CLIENT_SECRET=" \
            "AZURE_TENANT_ID=" \
            "AZURE_AD_CLIENT_ID=" \
            "AZURE_AD_CLIENT_SECRET=" \
            "AZURE_AD_TENANT_ID=" || echo "Failed to set frontend app settings"

          az webapp config appsettings set --name $ADMIN_APP --resource-group $RESOURCE_GROUP --settings \
            "AUTH_ENABLED=false" \
            "AZURE_USE_AUTHENTICATION=false" \
            "AZURE_ENABLE_AUTH=false" \
            "REQUIRE_AUTHENTICATION=false" \
            "AUTHENTICATION_ENABLED=false" \
            "AZURE_CLIENT_ID=" \
            "AZURE_CLIENT_SECRET=" \
            "AZURE_TENANT_ID=" \
            "AZURE_AD_CLIENT_ID=" \
            "AZURE_AD_CLIENT_SECRET=" \
            "AZURE_AD_TENANT_ID=" || echo "Failed to set admin app settings"

          # Disable authentication with retry logic
          echo "Disabling authentication on App Services..."

          # Disable authentication on frontend app
          for i in {1..3}; do
            if az webapp auth update --name $FRONTEND_APP --resource-group $RESOURCE_GROUP --enabled false; then
              echo "✅ Successfully disabled auth on frontend app"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            fi
          done

          # Disable authentication on admin app
          for i in {1..3}; do
            if az webapp auth update --name $ADMIN_APP --resource-group $RESOURCE_GROUP --enabled false; then
              echo "✅ Successfully disabled auth on admin app"
              break
            else
              echo "⚠️ Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            fi
          done

          # Additional App Service configuration for testing
          echo "Configuring App Services for testing environment..."

          # Set CORS to allow all origins for testing
          az webapp cors add --name $FRONTEND_APP --resource-group $RESOURCE_GROUP --allowed-origins "*" || echo "CORS already configured or failed"
          az webapp cors add --name $ADMIN_APP --resource-group $RESOURCE_GROUP --allowed-origins "*" || echo "CORS already configured or failed"

          # Restart apps to ensure new settings take effect
          echo "Restarting apps to apply new settings..."
          az webapp restart --name $FRONTEND_APP --resource-group $RESOURCE_GROUP || echo "Failed to restart frontend app"
          az webapp restart --name $ADMIN_APP --resource-group $RESOURCE_GROUP || echo "Failed to restart admin app"

          # Wait for apps to restart
          echo "Waiting for apps to restart..."
          sleep 60

          # Verify authentication is disabled
          echo "Verifying authentication status..."
          FRONTEND_AUTH_STATUS=$(az webapp auth show --name $FRONTEND_APP --resource-group $RESOURCE_GROUP --query "enabled" --output tsv 2>/dev/null || echo "false")
          ADMIN_AUTH_STATUS=$(az webapp auth show --name $ADMIN_APP --resource-group $RESOURCE_GROUP --query "enabled" --output tsv 2>/dev/null || echo "false")

          echo "Frontend Auth Enabled: $FRONTEND_AUTH_STATUS"
          echo "Admin Auth Enabled: $ADMIN_AUTH_STATUS"

          if [ "$FRONTEND_AUTH_STATUS" = "false" ] && [ "$ADMIN_AUTH_STATUS" = "false" ]; then
            echo "✅ Authentication successfully disabled on both apps"
          else
            echo "⚠️ Warning: Authentication may still be enabled on some apps"
          fi

      - name: Verify Deployment Health
        run: |
          # Test if the URLs are accessible
          if [ -n "${{ env.FRONTEND_WEBSITE_URL }}" ]; then
            echo "Testing frontend accessibility..."
            curl -f -s -o /dev/null "${{ env.FRONTEND_WEBSITE_URL }}" && echo "✅ Frontend is accessible" || echo "❌ Frontend is not accessible"
          fi

          if [ -n "${{ env.ADMIN_WEBSITE_URL }}" ]; then
            echo "Testing admin accessibility..."
            curl -f -s -o /dev/null "${{ env.ADMIN_WEBSITE_URL }}" && echo "✅ Admin is accessible" || echo "❌ Admin is not accessible"
          fi

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_ENV_NAME: ${{ github.run_id }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      imageTag: ${{ needs.deploy.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Destroy resources
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: make destroy
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION

      - name: Send Notification on Failure
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The CWYD Automation process has encountered an issue and has failed to complete successfully.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please investigate.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"
