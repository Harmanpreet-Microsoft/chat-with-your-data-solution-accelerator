name: Validate Deployment

on:
  push:
    branches:
      - main
      - dev
      - demo
  schedule:
    - cron: '0 8,20 * * *'  # Runs at 8:00 AM and 8:00 PM GMT
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    outputs:
      imageTag: ${{ steps.set-image-tag.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Quota Check
        id: quota-check
        run: |
          export AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          export AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          export AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          export GPT_MIN_CAPACITY="30"
          export TEXT_EMBEDDING_MIN_CAPACITY="30"
          export AZURE_REGIONS="${{ vars.AZURE_REGIONS }}"

          chmod +x scripts/checkquota.sh
          if ! scripts/checkquota.sh; then
            if grep -q "No region with sufficient quota found" scripts/checkquota.sh; then
              echo "QUOTA_FAILED=true" >> $GITHUB_ENV
            fi
            exit 1
          fi

      - name: Send Notification on Quota Failure
        if: env.QUOTA_FAILED == 'true'
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The quota check has failed, and the pipeline cannot proceed.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please take necessary action.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"

      - name: Fail Pipeline if Quota Check Fails
        if: env.QUOTA_FAILED == 'true'
        run: exit 1

      - name: Set Deployment Region
        run: |
          echo "Selected Region: $VALID_REGION"
          echo "AZURE_LOCATION=$VALID_REGION" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set imageTag
        id: set-image-tag
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          else
            echo "imageTag=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "::set-output name=imageTag::${{ github.ref_name }}"
          fi

      - name: Pre-build image and deploy
        uses: devcontainers/ci@v0.3
        env:
          AZURE_ENV_NAME: ${{ github.run_id }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
        with:
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          cacheFrom: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: |
            export optional_args="./code/tests"

            # Capture deployment output to a log file
            make ci 2>&1 | tee ci_output.log
            make deploy 2>&1 | tee deploy_output.log

            # Try to extract URLs from deployment logs as backup
            echo "=== Extracting URLs from deployment logs ==="
            grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" deploy_output.log | head -2 | tee extracted_urls.txt || echo "No URLs found in logs"

            # Check if we have admin URL in logs
            grep -E "Done: Deploying service adminweb" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_admin_url.txt || echo "" > log_admin_url.txt

            # Check if we have web URL in logs
            grep -E "Done: Deploying service web" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_frontend_url.txt || echo "" > log_frontend_url.txt

            echo "URLs from logs:"
            echo "Admin URL from logs: $(cat log_admin_url.txt)"
            echo "Frontend URL from logs: $(cat log_frontend_url.txt)"
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION
            AUTH_ENABLED=false
            AZURE_USE_AUTHENTICATION=false
            AZURE_ENABLE_AUTH=false

      - name: Extract URLs from deployment
        id: extract-urls
        run: |
          # Method 1: Check files created by Makefile
          echo "=== Method 1: Files from Makefile ==="
          if [ -f "frontend_url.txt" ]; then
            FRONTEND_URL=$(cat frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from makefile: '$FRONTEND_URL'"
          fi

          if [ -f "admin_url.txt" ]; then
            ADMIN_URL=$(cat admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from makefile: '$ADMIN_URL'"
          fi

          # Method 2: Check URLs extracted from logs
          echo "=== Method 2: URLs from deployment logs ==="
          if [ -f "log_frontend_url.txt" ]; then
            LOG_FRONTEND_URL=$(cat log_frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from logs: '$LOG_FRONTEND_URL'"
            if [ -z "$FRONTEND_URL" ] && [ -n "$LOG_FRONTEND_URL" ]; then
              FRONTEND_URL="$LOG_FRONTEND_URL"
            fi
          fi

          if [ -f "log_admin_url.txt" ]; then
            LOG_ADMIN_URL=$(cat log_admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from logs: '$LOG_ADMIN_URL'"
            if [ -z "$ADMIN_URL" ] && [ -n "$LOG_ADMIN_URL" ]; then
              ADMIN_URL="$LOG_ADMIN_URL"
            fi
          fi

          # Set outputs
          if [ -n "$FRONTEND_URL" ] && [ "$FRONTEND_URL" != "null" ] && [ "$FRONTEND_URL" != "" ]; then
            echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=$FRONTEND_URL" >> $GITHUB_ENV
            echo "✅ Frontend URL: $FRONTEND_URL"
          else
            echo "frontend_url=" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Frontend URL: Not found"
          fi

          if [ -n "$ADMIN_URL" ] && [ "$ADMIN_URL" != "null" ] && [ "$ADMIN_URL" != "" ]; then
            echo "admin_url=$ADMIN_URL" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=$ADMIN_URL" >> $GITHUB_ENV
            echo "✅ Admin URL: $ADMIN_URL"
          else
            echo "admin_url=" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Admin URL: Not found"
          fi

          # Additional debugging
          echo "=== All Available Files ==="
          ls -la *.txt *.log *.json 2>/dev/null || echo "No relevant files found"

      - name: Display URLs
        run: |
          echo "Frontend URL: ${{ env.FRONTEND_WEBSITE_URL }}"
          echo "Admin URL: ${{ env.ADMIN_WEBSITE_URL }}"

      - name: Configure App Services for Testing (Robust)
        run: |
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          echo "=== Robust App Service Authentication Disabling ==="

          # Method 1: Try to get from files created by Makefile
          RESOURCE_GROUP=""
          FRONTEND_APP=""
          ADMIN_APP=""

          if [ -f "resource_group.txt" ] && [ -s "resource_group.txt" ]; then
            RESOURCE_GROUP=$(cat resource_group.txt | tr -d '\n\r' | xargs)
            echo "✅ Found resource group from file: $RESOURCE_GROUP"
          fi

          if [ -f "frontend_app.txt" ] && [ -s "frontend_app.txt" ]; then
            FRONTEND_APP=$(cat frontend_app.txt | tr -d '\n\r' | xargs)
            echo "✅ Found frontend app from file: $FRONTEND_APP"
          fi

          if [ -f "admin_app.txt" ] && [ -s "admin_app.txt" ]; then
            ADMIN_APP=$(cat admin_app.txt | tr -d '\n\r' | xargs)
            echo "✅ Found admin app from file: $ADMIN_APP"
          fi

          # Method 2: Extract from URLs if we have them
          if [ -z "$FRONTEND_APP" ] && [ -n "${{ env.FRONTEND_WEBSITE_URL }}" ]; then
            FRONTEND_APP=$(echo "${{ env.FRONTEND_WEBSITE_URL }}" | sed 's|https://||;s|\.azurewebsites\.net.*||')
            echo "✅ Extracted frontend app from URL: $FRONTEND_APP"
          fi

          if [ -z "$ADMIN_APP" ] && [ -n "${{ env.ADMIN_WEBSITE_URL }}" ]; then
            ADMIN_APP=$(echo "${{ env.ADMIN_WEBSITE_URL }}" | sed 's|https://||;s|\.azurewebsites\.net.*||')
            echo "✅ Extracted admin app from URL: $ADMIN_APP"
          fi

          # Method 3: Discover resource group if still missing
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "🔍 Discovering resource group..."
            RESOURCE_GROUP=$(az group list --query "[?contains(name, 'rg-') || contains(name, '${{ github.run_id }}')].name" -o tsv | head -1)
            if [ -n "$RESOURCE_GROUP" ]; then
              echo "✅ Discovered resource group: $RESOURCE_GROUP"
            fi
          fi

          # Method 4: Discover apps from resource group if still missing
          if [ -n "$RESOURCE_GROUP" ] && ([ -z "$FRONTEND_APP" ] || [ -z "$ADMIN_APP" ]); then
            echo "🔍 Discovering apps in resource group $RESOURCE_GROUP..."
            APPS=$(az webapp list --resource-group "$RESOURCE_GROUP" --query "[].name" -o tsv)
            for app in $APPS; do
              echo "Found app: $app"
              if echo "$app" | grep -q "admin"; then
                ADMIN_APP="$app"
                echo "✅ Identified admin app: $ADMIN_APP"
              elif [ -z "$FRONTEND_APP" ]; then
                FRONTEND_APP="$app"
                echo "✅ Identified frontend app: $FRONTEND_APP"
              fi
            done
          fi

          # Check if we have what we need
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "❌ Could not determine resource group"
            exit 1
          fi

          if [ -z "$FRONTEND_APP" ] && [ -z "$ADMIN_APP" ]; then
            echo "❌ Could not find any apps to configure"
            exit 1
          fi

          echo "=== Configuration Summary ==="
          echo "Resource Group: $RESOURCE_GROUP"
          echo "Frontend App: ${FRONTEND_APP:-'Not found'}"
          echo "Admin App: ${ADMIN_APP:-'Not found'}"

          # Function to completely disable authentication
          disable_auth_completely() {
              local app_name=$1
              if [ -z "$app_name" ]; then
                echo "⚠️ App name is empty, skipping"
                return
              fi

              echo "=== Completely disabling authentication for $app_name ==="

              # Check if app exists
              if ! az webapp show --name "$app_name" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
                echo "❌ App $app_name not found in resource group $RESOURCE_GROUP"
                return
              fi

              # Step 1: Disable Easy Auth
              echo "Step 1: Disabling Easy Auth..."
              for attempt in {1..3}; do
                if az webapp auth update --name "$app_name" --resource-group "$RESOURCE_GROUP" --enabled false; then
                  echo "✅ Easy Auth disabled (attempt $attempt)"
                  break
                else
                  echo "❌ Easy Auth disable failed (attempt $attempt), retrying in 15s..."
                  sleep 15
                fi
              done

              # Step 2: Remove all authentication providers
              echo "Step 2: Removing authentication providers..."
              az webapp auth microsoft update --name "$app_name" --resource-group "$RESOURCE_GROUP" --client-id "" --client-secret "" --tenant-id "" 2>/dev/null || echo "No Microsoft provider to remove"
              az webapp auth google update --name "$app_name" --resource-group "$RESOURCE_GROUP" --client-id "" --client-secret "" 2>/dev/null || echo "No Google provider to remove"
              az webapp auth facebook update --name "$app_name" --resource-group "$RESOURCE_GROUP" --app-id "" --app-secret "" 2>/dev/null || echo "No Facebook provider to remove"
              az webapp auth twitter update --name "$app_name" --resource-group "$RESOURCE_GROUP" --consumer-key "" --consumer-secret "" 2>/dev/null || echo "No Twitter provider to remove"

              # Step 3: Set unauthenticated client action
              echo "Step 3: Setting unauthenticated client action..."
              az webapp config set --name "$app_name" --resource-group "$RESOURCE_GROUP" --generic-configurations '{"unauthenticatedClientAction":"AllowAnonymous"}' || echo "Failed setting unauthenticated action"

              # Step 4: Clear all authentication-related app settings
              echo "Step 4: Clearing authentication app settings..."
              az webapp config appsettings set --name "$app_name" --resource-group "$RESOURCE_GROUP" --settings \
                  "AUTH_ENABLED=false" \
                  "AZURE_USE_AUTHENTICATION=false" \
                  "AZURE_ENABLE_AUTH=false" \
                  "REQUIRE_AUTHENTICATION=false" \
                  "AUTHENTICATION_ENABLED=false" \
                  "WEBSITES_AUTH_ENABLED=false" \
                  "WEBSITE_AUTH_ENABLED=false" \
                  "AZURE_CLIENT_ID=" \
                  "AZURE_CLIENT_SECRET=" \
                  "AZURE_TENANT_ID=" \
                  "MICROSOFT_PROVIDER_AUTHENTICATION_SECRET=" \
                  "FACEBOOK_APP_SECRET=" \
                  "GOOGLE_CLIENT_SECRET=" \
                  "TWITTER_CONSUMER_SECRET=" || echo "Failed to set some settings"

              # Step 5: Direct resource update to ensure auth is disabled
              echo "Step 5: Direct auth configuration update..."
              az resource update \
                --resource-group "$RESOURCE_GROUP" \
                --name "$app_name/authsettings" \
                --resource-type "Microsoft.Web/sites/config" \
                --set properties.enabled=false \
                --set properties.unauthenticatedClientAction="AllowAnonymous" \
                --set properties.defaultProvider="" 2>/dev/null || echo "Direct auth config update failed"

              # Step 6: Configure CORS
              echo "Step 6: Configuring CORS..."
              az webapp cors add --name "$app_name" --resource-group "$RESOURCE_GROUP" --allowed-origins "*" || echo "CORS already configured"

              # Step 7: Restart app
              echo "Step 7: Restarting $app_name..."
              for i in {1..3}; do
                if az webapp restart --name "$app_name" --resource-group "$RESOURCE_GROUP"; then
                  echo "✅ $app_name restarted successfully (attempt $i)"
                  break
                else
                  echo "❌ $app_name restart failed (attempt $i), retrying in 15s..."
                  sleep 15
                fi
              done

              echo "✅ Authentication disable steps completed for $app_name"
          }

          # Apply authentication disabling to both apps (if they exist)
          if [ -n "$FRONTEND_APP" ]; then
            disable_auth_completely "$FRONTEND_APP"
          fi

          if [ -n "$ADMIN_APP" ]; then
            disable_auth_completely "$ADMIN_APP"
          fi

          echo "=== Waiting for changes to propagate ==="
          echo "Waiting 300 seconds for authentication settings to take effect..."
          sleep 300

          echo "=== Final Verification ==="
          if [ -n "$FRONTEND_APP" ]; then
            FRONTEND_AUTH=$(az webapp auth show --name "$FRONTEND_APP" --resource-group "$RESOURCE_GROUP" --query "enabled" --output tsv 2>/dev/null || echo "false")
            echo "Frontend Auth Enabled: $FRONTEND_AUTH"
          fi

          if [ -n "$ADMIN_APP" ]; then
            ADMIN_AUTH=$(az webapp auth show --name "$ADMIN_APP" --resource-group "$RESOURCE_GROUP" --query "enabled" --output tsv 2>/dev/null || echo "false")
            echo "Admin Auth Enabled: $ADMIN_AUTH"
          fi

          echo "✅ Authentication configuration completed"

      - name: Verify Deployment Health
        run: |
            echo "=== Final Deployment Health Check ==="

            # Wait additional time for services to be fully ready
            echo "Waiting additional 60 seconds for services to be ready..."
            sleep 60

            # Test if the URLs are accessible
            if [ -n "${{ env.FRONTEND_WEBSITE_URL }}" ]; then
              echo "Testing frontend accessibility..."
              for i in {1..5}; do
                if curl -f -s -L --max-time 30 "${{ env.FRONTEND_WEBSITE_URL }}" > /dev/null; then
                  echo "✅ Frontend is accessible (attempt $i)"
                  break
                else
                  echo "❌ Frontend not accessible (attempt $i), retrying in 30 seconds..."
                  sleep 30
                fi
              done
            else
              echo "❌ Frontend URL not available for testing"
            fi

            if [ -n "${{ env.ADMIN_WEBSITE_URL }}" ]; then
              echo "Testing admin accessibility..."
              for i in {1..5}; do
                if curl -f -s -L --max-time 30 "${{ env.ADMIN_WEBSITE_URL }}" > /dev/null; then
                  echo "✅ Admin is accessible (attempt $i)"
                  break
                else
                  echo "❌ Admin not accessible (attempt $i), retrying in 30 seconds..."
                  sleep 30
                fi
              done
            else
              echo "❌ Admin URL not available for testing"
            fi


  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_ENV_NAME: ${{ github.run_id }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      imageTag: ${{ needs.deploy.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Destroy resources
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: make destroy
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION

      - name: Send Notification on Failure
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The CWYD Automation process has encountered an issue and has failed to complete successfully.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please investigate.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"
