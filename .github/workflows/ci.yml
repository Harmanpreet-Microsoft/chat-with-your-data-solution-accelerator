name: Validate Deployment

on:
  push:
    branches:
      - main
      - dev
      - demo
  schedule:
    - cron: '0 8,20 * * *'  # Runs at 8:00 AM and 8:00 PM GMT
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    outputs:
      imageTag: ${{ steps.set-image-tag.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Quota Check
        id: quota-check
        run: |
          export AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          export AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          export AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          export GPT_MIN_CAPACITY="30"
          export TEXT_EMBEDDING_MIN_CAPACITY="30"
          export AZURE_REGIONS="${{ vars.AZURE_REGIONS }}"

          chmod +x scripts/checkquota.sh
          if ! scripts/checkquota.sh; then
            if grep -q "No region with sufficient quota found" scripts/checkquota.sh; then
              echo "QUOTA_FAILED=true" >> $GITHUB_ENV
            fi
            exit 1
          fi

      - name: Send Notification on Quota Failure
        if: env.QUOTA_FAILED == 'true'
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The quota check has failed, and the pipeline cannot proceed.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please take necessary action.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"

      - name: Fail Pipeline if Quota Check Fails
        if: env.QUOTA_FAILED == 'true'
        run: exit 1

      - name: Set Deployment Region
        run: |
          echo "Selected Region: $VALID_REGION"
          echo "AZURE_LOCATION=$VALID_REGION" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set imageTag
        id: set-image-tag
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "imageTag=latest" >> $GITHUB_ENV
            echo "::set-output name=imageTag::latest"
          else
            echo "imageTag=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "::set-output name=imageTag::${{ github.ref_name }}"
          fi

      - name: Pre-build image and deploy
        uses: devcontainers/ci@v0.3
        env:
          AZURE_ENV_NAME: ${{ github.run_id }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
        with:
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          cacheFrom: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: |
            export optional_args="./code/tests"

            # Capture deployment output to a log file
            make ci 2>&1 | tee ci_output.log
            make deploy 2>&1 | tee deploy_output.log

            # Try to extract URLs from deployment logs as backup
            echo "=== Extracting URLs from deployment logs ==="
            grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" deploy_output.log | head -2 | tee extracted_urls.txt || echo "No URLs found in logs"

            # Check if we have admin URL in logs
            grep -E "Done: Deploying service adminweb" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_admin_url.txt || echo "" > log_admin_url.txt

            # Check if we have web URL in logs
            grep -E "Done: Deploying service web" -A 2 deploy_output.log | grep -oE "https://[a-zA-Z0-9.-]*\.azurewebsites\.net/" > log_frontend_url.txt || echo "" > log_frontend_url.txt

            echo "URLs from logs:"
            echo "Admin URL from logs: $(cat log_admin_url.txt)"
            echo "Frontend URL from logs: $(cat log_frontend_url.txt)"
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION
            AUTH_ENABLED=false
            AZURE_USE_AUTHENTICATION=false
            AZURE_ENABLE_AUTH=false

      - name: Extract URLs from deployment
        id: extract-urls
        run: |
          # Method 1: Check files created by Makefile
          echo "=== Method 1: Files from Makefile ==="
          if [ -f "frontend_url.txt" ]; then
            FRONTEND_URL=$(cat frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from makefile: '$FRONTEND_URL'"
          fi

          if [ -f "admin_url.txt" ]; then
            ADMIN_URL=$(cat admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from makefile: '$ADMIN_URL'"
          fi

          # Method 2: Check URLs extracted from logs
          echo "=== Method 2: URLs from deployment logs ==="
          if [ -f "log_frontend_url.txt" ]; then
            LOG_FRONTEND_URL=$(cat log_frontend_url.txt | tr -d '\n\r' | xargs)
            echo "Frontend URL from logs: '$LOG_FRONTEND_URL'"
            if [ -z "$FRONTEND_URL" ] && [ -n "$LOG_FRONTEND_URL" ]; then
              FRONTEND_URL="$LOG_FRONTEND_URL"
            fi
          fi

          if [ -f "log_admin_url.txt" ]; then
            LOG_ADMIN_URL=$(cat log_admin_url.txt | tr -d '\n\r' | xargs)
            echo "Admin URL from logs: '$LOG_ADMIN_URL'"
            if [ -z "$ADMIN_URL" ] && [ -n "$LOG_ADMIN_URL" ]; then
              ADMIN_URL="$LOG_ADMIN_URL"
            fi
          fi

          # Set outputs
          if [ -n "$FRONTEND_URL" ] && [ "$FRONTEND_URL" != "null" ] && [ "$FRONTEND_URL" != "" ]; then
            echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=$FRONTEND_URL" >> $GITHUB_ENV
            echo "✅ Frontend URL: $FRONTEND_URL"
          else
            echo "frontend_url=" >> $GITHUB_OUTPUT
            echo "FRONTEND_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Frontend URL: Not found"
          fi

          if [ -n "$ADMIN_URL" ] && [ "$ADMIN_URL" != "null" ] && [ "$ADMIN_URL" != "" ]; then
            echo "admin_url=$ADMIN_URL" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=$ADMIN_URL" >> $GITHUB_ENV
            echo "✅ Admin URL: $ADMIN_URL"
          else
            echo "admin_url=" >> $GITHUB_OUTPUT
            echo "ADMIN_WEBSITE_URL=" >> $GITHUB_ENV
            echo "❌ Admin URL: Not found"
          fi

          # Additional debugging
          echo "=== All Available Files ==="
          ls -la *.txt *.log *.json 2>/dev/null || echo "No relevant files found"

      - name: Display URLs
        run: |
          echo "Frontend URL: ${{ env.FRONTEND_WEBSITE_URL }}"
          echo "Admin URL: ${{ env.ADMIN_WEBSITE_URL }}"

      - name: Configure App Services for Testing (Enhanced v2)
        run: |
                # Create the enhanced authentication disable script
                cat > disable_auth_enhanced.sh << 'EOF'
                #!/bin/bash
                set -e

                # Colors for output
                RED='\033[0;31m'
                GREEN='\033[0;32m'
                YELLOW='\033[1;33m'
                BLUE='\033[0;34m'
                NC='\033[0m'

                log_info() { echo -e "${BLUE}[INFO]${NC} $1"; }
                log_success() { echo -e "${GREEN}[SUCCESS]${NC} $1"; }
                log_warning() { echo -e "${YELLOW}[WARNING]${NC} $1"; }
                log_error() { echo -e "${RED}[ERROR]${NC} $1"; }

                # Extract app information
                FRONTEND_APP=""
                ADMIN_APP=""
                RESOURCE_GROUP=""

                if [ -n "$FRONTEND_WEBSITE_URL" ]; then
                    FRONTEND_APP=$(echo "$FRONTEND_WEBSITE_URL" | sed 's|https://||;s|\.azurewebsites\.net.*||')
                    log_success "Frontend app: $FRONTEND_APP"
                fi

                if [ -n "$ADMIN_WEBSITE_URL" ]; then
                    ADMIN_APP=$(echo "$ADMIN_WEBSITE_URL" | sed 's|https://||;s|\.azurewebsites\.net.*||')
                    log_success "Admin app: $ADMIN_APP"
                fi

                # Find resource group
                if [ -n "$FRONTEND_APP" ]; then
                    RESOURCE_GROUP=$(az webapp list --query "[?name=='$FRONTEND_APP'].resourceGroup" -o tsv | head -1)
                    log_success "Resource group: $RESOURCE_GROUP"
                fi

                disable_auth_completely() {
                    local app_name=$1
                    local rg_name=$2

                    log_info "=== Disabling Authentication for $app_name ==="

                    # Step 1: Disable via webapp auth
                    log_info "Disabling webapp auth..."
                    for i in {1..5}; do
                        if az webapp auth update --name "$app_name" --resource-group "$rg_name" --enabled false >/dev/null 2>&1; then
                            log_success "Webapp auth disabled (attempt $i)"
                            break
                        else
                            log_warning "Webapp auth disable failed (attempt $i), retrying..."
                            sleep 10
                        fi
                    done

                    # Step 2: ARM template approach
                    log_info "Applying ARM template auth settings..."
                    AUTH_JSON='{
                      "properties": {
                        "enabled": false,
                        "unauthenticatedClientAction": "AllowAnonymous",
                        "defaultProvider": null,
                        "tokenStoreEnabled": false,
                        "clientId": null,
                        "clientSecret": null,
                        "issuer": null
                      }
                    }'

                    echo "$AUTH_JSON" > auth_settings.json
                    az rest --method PUT \
                        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$rg_name/providers/Microsoft.Web/sites/$app_name/config/authsettings?api-version=2020-06-01" \
                        --body @auth_settings.json >/dev/null 2>&1 || log_warning "ARM auth update failed"
                    rm -f auth_settings.json

                    # Step 3: Clear auth app settings
                    log_info "Clearing auth app settings..."
                    az webapp config appsettings delete --name "$app_name" --resource-group "$rg_name" --setting-names \
                        "MICROSOFT_PROVIDER_AUTHENTICATION_SECRET" \
                        "AZURE_CLIENT_ID" \
                        "AZURE_CLIENT_SECRET" \
                        "AZURE_TENANT_ID" >/dev/null 2>&1 || true

                    az webapp config appsettings set --name "$app_name" --resource-group "$rg_name" --settings \
                        "AUTH_ENABLED=false" \
                        "AZURE_USE_AUTHENTICATION=false" \
                        "WEBSITES_AUTH_ENABLED=false" >/dev/null 2>&1 || true

                    # Step 4: Update site configuration
                    log_info "Updating site configuration..."
                    SITE_CONFIG='{
                      "properties": {
                        "siteAuthEnabled": false,
                        "siteAuthSettings": {
                          "enabled": false,
                          "unauthenticatedClientAction": "AllowAnonymous"
                        }
                      }
                    }'

                    echo "$SITE_CONFIG" > site_config.json
                    az rest --method PATCH \
                        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$rg_name/providers/Microsoft.Web/sites/$app_name/config/web?api-version=2020-06-01" \
                        --body @site_config.json >/dev/null 2>&1 || log_warning "Site config update failed"
                    rm -f site_config.json

                    # Step 5: Update CORS
                    log_info "Updating CORS..."
                    az webapp cors add --name "$app_name" --resource-group "$rg_name" --allowed-origins "*" >/dev/null 2>&1 || true

                    # Step 6: Restart app
                    log_info "Restarting app..."
                    for i in {1..3}; do
                        if az webapp restart --name "$app_name" --resource-group "$rg_name" >/dev/null 2>&1; then
                            log_success "App restarted (attempt $i)"
                            break
                        else
                            log_warning "Restart failed (attempt $i), retrying..."
                            sleep 15
                        fi
                    done

                    log_success "Authentication disable completed for $app_name"
                }

                # Apply to both apps
                if [ -n "$FRONTEND_APP" ] && [ -n "$RESOURCE_GROUP" ]; then
                    disable_auth_completely "$FRONTEND_APP" "$RESOURCE_GROUP"
                fi

                if [ -n "$ADMIN_APP" ] && [ -n "$RESOURCE_GROUP" ]; then
                    disable_auth_completely "$ADMIN_APP" "$RESOURCE_GROUP"
                fi

                # Wait for propagation
                log_info "Waiting 180 seconds for changes to propagate..."
                sleep 180

                # Test accessibility
                log_info "=== Testing Accessibility ==="
                if [ -n "$FRONTEND_WEBSITE_URL" ]; then
                    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 30 "$FRONTEND_WEBSITE_URL" || echo "000")
                    if [[ "$HTTP_CODE" =~ ^(200|302|301)$ ]]; then
                        log_success "Frontend accessible (HTTP $HTTP_CODE)"
                    else
                        log_error "Frontend returned HTTP $HTTP_CODE"
                    fi
                fi

                if [ -n "$ADMIN_WEBSITE_URL" ]; then
                    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 30 "$ADMIN_WEBSITE_URL" || echo "000")
                    if [[ "$HTTP_CODE" =~ ^(200|302|301)$ ]]; then
                        log_success "Admin accessible (HTTP $HTTP_CODE)"
                    else
                        log_error "Admin returned HTTP $HTTP_CODE"
                    fi
                fi

                log_success "Enhanced authentication disable completed!"
                EOF

                # Make script executable and run it
                chmod +x disable_auth_enhanced.sh

                # Login to Azure
                az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
                az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

                # Set environment variables and run the script
                export FRONTEND_WEBSITE_URL="${{ env.FRONTEND_WEBSITE_URL }}"
                export ADMIN_WEBSITE_URL="${{ env.ADMIN_WEBSITE_URL }}"
                export AZURE_SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

                # Run the enhanced script
                ./disable_auth_enhanced.sh

      - name: Final Status Check
        run: |
                echo "=== Final Deployment Status ==="
                echo "Frontend URL: ${{ env.FRONTEND_WEBSITE_URL }}"
                echo "Admin URL: ${{ env.ADMIN_WEBSITE_URL }}"
                echo ""
                echo "🚀 Deployment completed!"
                echo "⏰ If you still see authentication errors, wait an additional 10-15 minutes."
                echo "🔄 Azure authentication changes can take up to 15 minutes to fully propagate."
                echo ""
                echo "🌐 Try accessing your applications:"
                echo "   Frontend: ${{ env.FRONTEND_WEBSITE_URL }}"
                echo "   Admin: ${{ env.ADMIN_WEBSITE_URL }}"
      - name: Wait for 30 minutes
        run: sleep 1800

      - name: Verify Deployment Health
        run: |
            echo "=== Final Deployment Health Check ==="

            # Wait additional time for services to be fully ready
            echo "Waiting additional 60 seconds for services to be ready..."
            sleep 60

            # Test if the URLs are accessible
            if [ -n "${{ env.FRONTEND_WEBSITE_URL }}" ]; then
              echo "Testing frontend accessibility..."
              for i in {1..5}; do
                if curl -f -s -L --max-time 30 "${{ env.FRONTEND_WEBSITE_URL }}" > /dev/null; then
                  echo "✅ Frontend is accessible (attempt $i)"
                  break
                else
                  echo "❌ Frontend not accessible (attempt $i), retrying in 30 seconds..."
                  sleep 30
                fi
              done
            else
              echo "❌ Frontend URL not available for testing"
            fi

            if [ -n "${{ env.ADMIN_WEBSITE_URL }}" ]; then
              echo "Testing admin accessibility..."
              for i in {1..5}; do
                if curl -f -s -L --max-time 30 "${{ env.ADMIN_WEBSITE_URL }}" > /dev/null; then
                  echo "✅ Admin is accessible (attempt $i)"
                  break
                else
                  echo "❌ Admin not accessible (attempt $i), retrying in 30 seconds..."
                  sleep 30
                fi
              done
            else
              echo "❌ Admin URL not available for testing"
            fi


  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_ENV_NAME: ${{ github.run_id }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      imageTag: ${{ needs.deploy.outputs.imageTag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Destroy resources
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: ghcr.io/azure-samples/chat-with-your-data-solution-accelerator
          imageTag: ${{ env.imageTag }}
          runCmd: make destroy
          env: |
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_ENV_NAME
            AZURE_LOCATION

      - name: Send Notification on Failure
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMAIL_BODY=$(cat <<EOF
          {
            "body": "<p>Dear Team,</p><p>The CWYD Automation process has encountered an issue and has failed to complete successfully.</p><p><strong>Build URL:</strong> ${RUN_URL}</p><p>Please investigate.</p><p>Best regards,<br>Your Automation Team</p>"
          }
          EOF
          )

          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send notification"
